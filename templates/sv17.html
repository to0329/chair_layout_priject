<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>イス配置シミュレータ | イベント会場の座席数を自動計算</title>

  <meta name="google-site-verification" content="AXz5_dUosCYMj6jNapTpVmyEFWeTlV46AcrwSXdQCn0" />
  <meta name="description" content="無料で使えるイス配置シミュレータ。会場とイスのサイズ、イスの数を入力するだけで、レイアウト図を自動作成。イベントの準備に最適です。">

  <meta property="og:url" content="https://chair-layout.onrender.com">
  <meta property="og:type" content="website">
  <meta property="og:title" content="イス配置シミュレータ | イベント会場の座席数を自動計算">
  <meta property="og:description" content="会場とイスのサイズとイスの数を入力するだけで、レイアウト図を自動作成します。">
  <meta property="og:site_name" content="イス配置シミュレータ">
  <meta property="og:image" content="{{ url_for('static', filename='logo_180x180.png', _external=True) }}">
  <link rel="canonical" href="https://chair-layout.onrender.com">
  
  <link rel="icon" href="{{ url_for('static', filename='logo.png') }}" type="image/png">
  
  <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='logo_180x180.png', _external=True) }}">

  <style>
    /* ▼▼▼ 全体的なフォントサイズを小さく調整 ▼▼▼ */
    body {
      font-size: 14px; /* 全体のベースフォントサイズを小さく */
      line-height: 1.6; /* 行の高さを調整し、読みやすくする */
    }

    h1 {
      font-size: 24px; /* h1のフォントサイズを調整 */
    }

    h3 {
      font-size: 18px; /* h3のフォントサイズを調整 */
    }

    p {
      margin-bottom: 8px; /* 段落間の余白を調整 */
    }
    /* ▲▲▲ ここまで ▲▲▲ */

    /*.settings_panelは、class="settings_panel"と指定されたものに、{ }の中を適用すること*/
    .settings_panel {
      display: none;
      border-left: 2px solid #696969;
      /*左側に実線*/
      padding-left: 15px;
      margin-left: 10px;
    }

    #result {
      white-space: pre-wrap;
      /* 改行文字(\n)を改行として表示する設定 */
    }

    .highlight {
      font-weight: bold;
      /* このクラスが指定された文字を太字にする */
    }
    
    /* ▼▼▼ 計算ボタンのスタイルを追加 ▼▼▼ */
    .calc-button {
      display: block; /* ボタンをブロック要素にして幅を100%にする */
      width: 100%;
      font-size: 18px; /* フォントサイズを大きく */
      font-weight: bold; /* フォントを太字に */
      color: white; /* 文字色を白に */
      background-color: #007bff; /* 背景色を青に */
      border: none; /* 枠線を削除 */
      padding: 12px 0; /* 上下の余白を大きく */
      border-radius: 5px; /* 角を少し丸くする */
      cursor: pointer; /* マウスカーソルを指の形に */
      margin-top: 20px; /* 上に少し余白を追加 */
      transition: background-color 0.2s; /* 背景色の変化を滑らかに */
    }

    .calc-button:hover {
      background-color: #0056b3; /* マウスが乗った時に少し濃い青に */
    }
    /* ▲▲▲ ここまで追加 ▲▲▲ */

    /* ▼▼▼ 2画面レイアウトのためのCSS (変更なし) ▼▼▼ */
    .layout-container {
      display: flex; /* Flexboxを有効にし、子要素を横並びにする */
      gap: 24px;     /* 左右のカラム間の隙間を設定 */
    }

    .input-panel {
      width: 50%; /* 左カラムの幅を全体の50%に */
      padding-right: 24px; /* 右カラムとの境界が分かりやすくなるように余白を追加 */
      border-right: 1px solid #ccc; /* 右側に境界線を追加 */
    }

    .output-panel {
      width: 50%; /* 右カラムの幅を全体の50%に */
    }

    /* スマートフォンなど画面幅が狭い場合の表示設定 */
    @media (max-width: 800px) {
      .layout-container {
        flex-direction: column; /* 横並びから縦並びに変更 */
      }
      .input-panel, .output-panel {
        width: 100%; /* 各カラムの幅を100%に戻す */
        border-right: none; /* 縦並びの際は境界線を削除 */
        padding-right: 0;
      }
    }
    /* ▲▲▲ ここまで ▲▲▲ */
  </style>
</head>

<body>
  <div class="layout-container">

    <div class="input-panel">
      <h1>イス配置シミュレータ</h1>
      <p>
        <strong>イベント会場のイス配置でお悩みですか？</strong><br>
        このツールは、会場とイスのサイズ、イスの数を入力するとレイアウトを画像として出力します。
      </p>
      <h3>入力<span style="color: red; font-size: 70%;">（必須）</span></h3>
      <p>会場のサイズ：<input id="hall_depth" placeholder="会場の奥行き (m)" value="30">m × <input id="hall_width" placeholder="会場の幅 (m)" value="20">m</p>
      <p>イスのサイズ：<input id="chair_depth" placeholder="イスの奥行き (cm)" value="50">cm × <input id="chair_width" placeholder="イスの幅 (cm)" value="50">cm</p>
      <p>必要なイスの数：<input id="num_chairs" placeholder="イスの数" value="400">脚</p>

      <h3>通路のオプション</h3>
      <p>最前列の通路の幅：<input id="front_aisle_width" placeholder="最前列の通路の幅 (cm)" value="100">cm</p>
      <p><input type="checkbox" id="add_side_aisles"> 左右の端に通路を設置する</p>
      <p>
        <label for="aisle_mode">通路のタイプ：</label>
        <select id="aisle_mode" onchange="updateAisleSettings()">
          <option value="none">通路なし</option>
          <option value="every_n">〇脚おきに通路</option>
          <option value="fixed_number">〇本の通路を均等配置</option>
        </select>
      </p>

      <div id="aisle_settings_every_n" class="settings_panel">
        <p>通路の間隔（横）：<input id="aisle_every_x" placeholder="通路の間隔（横）" value="3">脚おき</p>
        <p>通路の間隔（縦）：<input id="aisle_every_y" placeholder="通路の間隔（縦）" value="3">脚おき</p>
      </div>

      <div id="aisle_settings_fixed_number" class="settings_panel">
        <p>通路の本数（縦）：<input id="num_aisles_x" placeholder="縦通路の本数" value="1">本</p>
        <p>通路の本数（横）：<input id="num_aisles_y" placeholder="横通路の本数" value="1">本</p>
      </div>

      <h3>その他のオプション</h3>
      <p>イス同士の最低の間隔（縦・横）：<input id="min_spacing_y" placeholder="縦の間隔 (cm)" value="100">cm × <input id="min_spacing_x" placeholder="横の間隔 (cm)" value="20">cm</p>
      <p><input type="checkbox" id="zigzag_layout"> イスをジグザグに配置する</p>
      
      <button onclick="sendData()" class="calc-button">計算</button>
    </div>
    <div class="output-panel">
      <p id="loading" style="display: none; font-weight: bold;">処理中…</p>
      <p id="result"></p>
      <canvas id="layoutCanvas" style="max-width: 350px; width: 100%; border: 1px solid black; display: none;"></canvas>
    </div>
  </div>
  <script>
    function updateAisleSettings() { //メニュー変更すると実行されるメソッド
      const mode = document.getElementById("aisle_mode").value; //モードを取得
      const panel_every_n = document.getElementById("aisle_settings_every_n"); //「〇脚おきに通路」のp要素を取得
      const panel_fixed_number = document.getElementById("aisle_settings_fixed_number"); //「〇本の通路を均等配置」のp要素を取得

      //一度メニュー内容をリセット(非表示)に
      panel_every_n.style.display = "none";
      panel_fixed_number.style.display = "none";

      //選ばれたメニューのみ非表示をブロック(表示)する
      if (mode === "every_n") {
        panel_every_n.style.display = "block";
      } else if (mode === "fixed_number") {
        panel_fixed_number.style.display = "block";
      }
    }

    //ページの読み込みをしたらupdateAisleSettings()を実行するという命令
    document.addEventListener("DOMContentLoaded", updateAisleSettings);

    async function sendData() { //「計算」を押すと実行されるメソッド
      // ▼▼▼ 変更（ID取得部分のみ） ▼▼▼
      const loadingMessage = document.getElementById("loading");
      const resultDisplay = document.getElementById("result");
      // const imageDisplay = document.getElementById("layoutImage"); // 不要になったのでコメントアウト
      const canvasDisplay = document.getElementById("layoutCanvas"); // canvasを取得
      // ▲▲▲ 変更 ▲▲▲

      // 以前の結果をクリアし、「処理中」メッセージを表示
      loadingMessage.style.display = "block";
      resultDisplay.innerHTML = '';
      // ▼▼▼ 変更 ▼▼▼
      // imageDisplay.style.display = "none";
      canvasDisplay.style.display = "none"; // canvasを非表示に
      // ▲▲▲ 変更 ▲▲▲

      const mode = document.getElementById("aisle_mode").value; //モードを取得
      const zigzag_checked = document.getElementById("zigzag_layout").checked; // ジグザグの有無を取得

      const data = {
        hall_width: parseFloat(document.getElementById("hall_width").value) * 100,
        hall_depth: parseFloat(document.getElementById("hall_depth").value) * 100,
        chair_width: parseInt(document.getElementById("chair_width").value),
        chair_depth: parseInt(document.getElementById("chair_depth").value),
        num_chairs: parseInt(document.getElementById("num_chairs").value),
        aisle_mode: mode,
        add_side_aisles: document.getElementById("add_side_aisles").checked,
        zigzag_layout: zigzag_checked,
        // ▼▼▼ 追加: 新しいオプションの値を取得して送信データに含める ▼▼▼
        front_aisle_width: parseInt(document.getElementById("front_aisle_width").value),
        min_spacing_x: parseInt(document.getElementById("min_spacing_x").value),
        min_spacing_y: parseInt(document.getElementById("min_spacing_y").value),
        // ▲▲▲ 追加 ▲▲▲
      };

      if (mode === "every_n") {
        data.aisle_every_x = parseInt(document.getElementById("aisle_every_x").value);
        data.aisle_every_y = parseInt(document.getElementById("aisle_every_y").value);
      } else if (mode === "fixed_number") {
        data.num_aisles_x = parseInt(document.getElementById("num_aisles_x").value);
        data.num_aisles_y = parseInt(document.getElementById("num_aisles_y").value);
      }

      try { // try...finally を使って、成功・失敗に関わらず処理後にメッセージを消す
        const response = await fetch("/calculate", { //Python側の@app.route("/calculate", ...)と対応している
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(data), //sendData()内で作ったdataを送っている
        });

        const result = await response.json(); //レスポンスの受け取り
        const display = document.getElementById("result");
        // const image = document.getElementById("layoutImage"); // 不要

        display.innerHTML = '';

        // ▼▼▼ 変更 ▼▼▼
        // 【高速化②】サーバーから送られてくる画像(image)の代わりに座標データ(coords)をチェックする
        if (!result.coords || result.coords.length === 0) { //イスを1脚も配置できなかった場合の処理
          const strongText = document.createElement('span'); //spanという空タグを作成
          strongText.className = 'highlight'; //spanタグ内にCSSクラスを追記
          strongText.textContent = 'イスを1脚も配置できません！'; //タグの間に文字列を入れる
          display.appendChild(strongText); //ここまで太字にしてきた部分を文字列に追加
          display.appendChild(document.createTextNode('\n会場やイスのサイズを見直してください。')); //太字ではない部分を追加

          // image.style.display = "none"; // 不要
          return; //sendData()を終了
        }

        // image.src = "data:image/png;base64," + result.image; //画像データの指定
        // image.style.display = "block"; //画像を表示
        // 代わりに、新しい描画関数を呼び出す
        drawLayout(result);
        // ▲▲▲ 変更 ▲▲▲

        if (result.found) {
          const strongText = document.createElement('span');
          strongText.className = 'highlight';
          strongText.textContent = '配置成功！';
          display.appendChild(strongText);
          display.appendChild(document.createTextNode(` ${result.total}脚のイスを配置しました。\n`));
        } else {
          const strongText1 = document.createElement('span');
          strongText1.className = 'highlight';
          strongText1.textContent = 'ご希望の数を配置できませんでした。';
          display.appendChild(strongText1);

          display.appendChild(document.createTextNode('\n現在の入力で配置できる最大数（'));

          const strongText2 = document.createElement('span');
          strongText2.className = 'highlight';
          strongText2.textContent = `${result.max}脚`;
          display.appendChild(strongText2);

          display.appendChild(document.createTextNode('）のレイアウトを表示します。\n'));
        }

        //共通の情報を追加
        display.appendChild(document.createTextNode(
          `最大配置数： ${result.cols}列 × ${result.rows}行 = ${result.max}脚\n` +
          `壁からの距離：横${result.offset_x}cm 縦${result.offset_y}cm\n` +
          `間隔：横${result.spacing_x}cm 縦${result.spacing_y}cm`
        ));

        //ジグザグ配置が有効な場合、ズレの情報を追記
        if (zigzag_checked && result.zigzag_offset > 0) {
          display.appendChild(document.createTextNode(`\nジグザグのズレ：${result.zigzag_offset.toFixed(1)}cm`));
        }
      } catch (error) {
        console.error("エラーが発生しました:", error);
        resultDisplay.textContent = "エラーが発生しました。時間を置いて再度お試しください。";
      } finally {
        // ▼▼▼ ここから追加 ▼▼▼
        // 処理が完了したら「処理中」メッセージを非表示にする
        loadingMessage.style.display = "none";
        // ▲▲▲ ここまで追加 ▲▲▲
      }
    }

    // ▼▼▼ 変更なし ▼▼▼
    /**
     * 【高速化②】サーバーから受け取ったデータをもとにCanvasにレイアウト図を描画する新しい関数
     * @param {object} data サーバーからのレスポンスデータ
     */
    function drawLayout(data) {
        const canvas = document.getElementById("layoutCanvas");
        const ctx = canvas.getContext("2d");

        // Canvasの内部的な解像度を会場のサイズ（cm単位）に合わせる
        canvas.width = data.hall_width;
        canvas.height = data.hall_depth;
        canvas.style.display = "block"; // canvasを表示状態にする

        // 前回の描画をクリア
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 会場の外枠を描画
        ctx.strokeStyle = 'black';
        ctx.lineWidth = 5;
        ctx.strokeRect(0, 0, data.hall_width, data.hall_depth);

        // イスの描画スタイルを設定
        ctx.fillStyle = 'skyblue';
        ctx.strokeStyle = 'gray';
        ctx.lineWidth = 1;

        // サーバーから受け取ったすべてのイスの座標を描画
        data.coords.forEach(coord => {
            const [x, y] = coord;
            ctx.fillRect(x, y, data.chair_width, data.chair_depth);
            ctx.strokeRect(x, y, data.chair_width, data.chair_depth);
        });
        
        // イスが1脚もなければ、ここで処理を終了する
        if (data.coords.length === 0) {
            return;
        }

        // --- イスとイスの間隔を描画する処理 ---
        // 寸法線とテキストのスタイルを設定
        ctx.fillStyle = '#d33'; // テキストの色を赤に
        ctx.strokeStyle = '#d33'; // 線の色を赤に
        ctx.lineWidth = 2;
        // フォントサイズを小さく調整 (最小値を10pxに設定)
        const fontSize = Math.max(10, Math.min(data.chair_width, data.chair_depth) * 0.2);
        ctx.font = `bold ${fontSize}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // 横方向の間隔を描画 (イスが2脚以上ある場合のみ)
        if (data.cols > 1 && data.coords.length >= 2) {
            const chair1 = data.coords[0]; const chair2 = data.coords[1];
            const startX = chair1[0] + data.chair_width; const endX = chair2[0];
            const midY = chair1[1] + data.chair_depth / 2;
            ctx.beginPath();
            ctx.moveTo(startX, midY); ctx.lineTo(endX, midY);
            ctx.moveTo(startX, midY - 10); ctx.lineTo(startX, midY + 10);
            ctx.moveTo(endX, midY - 10); ctx.lineTo(endX, midY + 10);
            ctx.stroke();
            ctx.fillText(`${data.spacing_x} cm`, startX + data.spacing_x / 2, midY);
        }

        // 縦方向の間隔を描画 (2列目があり、そこにイスが配置されている場合のみ)
        if (data.rows > 1 && data.coords.length > data.cols) {
            const chair1 = data.coords[0]; const chair2 = data.coords[data.cols];
            const startY = chair1[1] + data.chair_depth; const endY = chair2[1];
            const midX = chair1[0] + data.chair_width / 2;
            ctx.beginPath();
            ctx.moveTo(midX, startY); ctx.lineTo(midX, endY);
            ctx.moveTo(midX - 10, startY); ctx.lineTo(midX + 10, startY);
            ctx.moveTo(midX - 10, endY); ctx.lineTo(midX + 10, endY);
            ctx.stroke();
            ctx.fillText(`${data.spacing_y} cm`, midX, startY + data.spacing_y / 2);
        }
        
        // --- 壁とイスの間の距離を描画する処理 ---
        // スタイルを青色に変更
        ctx.fillStyle = '#007bff';
        ctx.strokeStyle = '#007bff';
        // (fontSizeは上で定義済みなので再定義しない)
        
        const firstChair = data.coords[0];
        // 1列目の一番右のイスを取得（ただしイスが足りない場合も考慮）
        const lastChairInFirstRow = data.coords[Math.min(data.cols - 1, data.coords.length - 1)];
        const lastChair = data.coords[data.coords.length - 1];

        // --- 上壁からの距離 (offset_y) ---
        ctx.textAlign = 'left';
        const topTextX = firstChair[0] + data.chair_width / 2;
        const topTextY = firstChair[1] / 2;
        ctx.beginPath();
        ctx.moveTo(topTextX - 10, 0); ctx.lineTo(topTextX + 10, 0);
        ctx.moveTo(topTextX, 0); ctx.lineTo(topTextX, firstChair[1]);
        ctx.moveTo(topTextX - 10, firstChair[1]); ctx.lineTo(topTextX + 10, firstChair[1]);
        ctx.stroke();
        ctx.fillText(`${data.offset_y} cm`, topTextX + 15, topTextY);

        // --- 左壁からの距離 (offset_x) ---
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        const leftTextX = firstChair[0] / 2;
        const leftTextY = firstChair[1] + data.chair_depth / 2;
        ctx.beginPath();
        ctx.moveTo(0, leftTextY - 10); ctx.lineTo(0, leftTextY + 10);
        ctx.moveTo(0, leftTextY); ctx.lineTo(firstChair[0], leftTextY);
        ctx.moveTo(firstChair[0], leftTextY - 10); ctx.lineTo(firstChair[0], leftTextY + 10);
        ctx.stroke();
        ctx.fillText(`${data.offset_x} cm`, leftTextX, leftTextY - 5);

        // --- 右壁からの距離 ---
        const rightStartX = lastChairInFirstRow[0] + data.chair_width;
        const rightGap = data.hall_width - rightStartX;
        const rightTextX = rightStartX + rightGap / 2;
        const rightTextY = lastChairInFirstRow[1] + data.chair_depth / 2;
        ctx.beginPath();
        ctx.moveTo(rightStartX, rightTextY - 10); ctx.lineTo(rightStartX, rightTextY + 10);
        ctx.moveTo(rightStartX, rightTextY); ctx.lineTo(data.hall_width, rightTextY);
        ctx.moveTo(data.hall_width, rightTextY - 10); ctx.lineTo(data.hall_width, rightTextY + 10);
        ctx.stroke();
        ctx.fillText(`${Math.round(rightGap)} cm`, rightTextX, rightTextY - 5);

        // --- 下壁からの距離 ---
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        const bottomStartY = lastChair[1] + data.chair_depth;
        const bottomGap = data.hall_depth - bottomStartY;
        const bottomTextX = lastChair[0] + data.chair_width / 2;
        const bottomTextY = bottomStartY + bottomGap / 2;
        ctx.beginPath();
        ctx.moveTo(bottomTextX - 10, bottomStartY); ctx.lineTo(bottomTextX + 10, bottomStartY);
        ctx.moveTo(bottomTextX, bottomStartY); ctx.lineTo(bottomTextX, data.hall_depth);
        ctx.moveTo(bottomTextX - 10, data.hall_depth); ctx.lineTo(bottomTextX + 10, data.hall_depth);
        ctx.stroke();
        ctx.fillText(`${Math.round(bottomGap)} cm`, bottomTextX + 15, bottomTextY);
    }
  </script>

</body>

</html>
