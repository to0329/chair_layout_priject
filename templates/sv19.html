<style>
    /* タイトルの色付け (例: 青色) */
    /* 注: <title>タグ自体には直接スタイルを適用できません。 */
    /* これはページのファビコンやブラウザタブのテキストなので、 */
    /* 実際にはページ内の見出し(h1など)をタイトルと見なして色を付けることが多いです。 */
    /* もしh1タグなど、ページ内に表示されるタイトルであれば以下のようにします */
    h1.page-title {
        color: #007bff; /* 青色 */
    }

    /* メニューのスタイル */
    .menu-container {
        background-color: #f8f9fa; /* 薄い灰色 */
        padding: 10px;
        border-bottom: 1px solid #e2e6ea;
        margin-bottom: 20px;
    }

    .menu-toggle-button {
        background-color: #007bff;
        color: white;
        border: none;
        padding: 8px 15px;
        cursor: pointer;
        font-size: 16px;
        border-radius: 4px;
        margin-bottom: 10px;
    }

    .menu-toggle-button:hover {
        background-color: #0056b3;
    }

    .menu-content {
        display: block; /* デフォルトで表示 */
        list-style: none; /* リストの点マークを消す */
        padding: 0;
        margin: 0;
    }

    .menu-content.hidden {
        display: none; /* hiddenクラスが付与されたら非表示 */
    }

    .menu-content li a {
        display: block;
        padding: 8px 0;
        text-decoration: none;
        color: #333;
    }

    .menu-content li a:hover {
        background-color: #e9ecef;
    }
</style>
