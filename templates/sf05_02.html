<body>

<nav class="navbar is-fixed-top is-primary" role="navigation" aria-label="main navigation">

<div class="columns is-gapless" style="height: calc(100vh - 52px); margin-top: 52px;">
  
  <div class="column is-one-quarter sidebar">
    <h2 class="title is-4">入力フォーム</h2>
    
    <div class="dimensions-box">
      <p class="subtitle is-6">会場寸法 (cm)</p>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">幅 (W)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="hallWidth" value="1000" min="1" max="15000"></p></div></div>
      </div>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">奥行 (D)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="hallDepth" value="2000" min="1" max="15000"></p></div></div>
      </div>
    </div>
    
    <div class="dimensions-box">
      <p class="subtitle is-6">イス寸法と間隔 (cm)</p>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">イス幅 (w)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="chairWidth" value="50" min="1" max="500"></p></div></div>
      </div>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">イス奥行 (d)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="chairDepth" value="50" min="1" max="500"></p></div></div>
      </div>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">横間隔 (sx)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="spacingX" value="20" min="0" max="300"></p></div></div>
      </div>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">縦間隔 (sy)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="spacingY" value="100" min="0" max="300"></p></div></div>
      </div>
    </div>

    <div class="dimensions-box">
      <p class="subtitle is-6">壁からの距離 (cm)</p>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">左 (L)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="wallSpaceL" value="100" min="0"></p></div></div>
      </div>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">右 (R)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="wallSpaceR" value="100" min="0"></p></div></div>
      </div>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">上 (U)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="wallSpaceU" value="100" min="0"></p></div></div>
      </div>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">下 (D)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="wallSpaceD" value="100" min="0"></p></div></div>
      </div>
    </div>
    
    <div class="dimensions-box">
      <p class="subtitle is-6">通路設定</p>
      <div class="field">

              <option value="none">なし</option>

              <option value="horizontal">水平通路（列の間）</option>
              <option value="both" selected>両方</option>
            </select>
          </div>
        </div>
      </div>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">垂直通路間隔(列)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="aisleVInterval" value="7" min="1"></p></div></div>
      </div>
      <div class="field is-horizontal">
        <div class="field-label is-normal"><label class="label">水平通路間隔(行)</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="aisleHInterval" value="7" min="1"></p></div></div>
      </div>
    </div>

    <div class="dimensions-box">
      <p class="subtitle is-6">計算モード</p>
      <div class="field">

            <select id="calculationMode">
              <option value="max" selected>最大配置数</option>
              <option value="total">指定数配置</option>
            </select>
          </div>
        </div>
      </div>
      <div class="field is-horizontal" id="requiredChairsField" style="display: none;">
        <div class="field-label is-normal"><label class="label">要求イス数</label></div>
        <div class="field-body"><div class="field"><p class="control"><input class="input is-small" type="number" id="requiredChairs" value="200" min="1" max="50000"></p></div></div>
      </div>
    </div>
    
    <div class="field">
      <div class="control">
        <button class="button is-primary is-fullwidth" onclick="calculateLayout()">レイアウトを計算</button>
      </div>
    </div>
    
    <div id="result" class="result-box" style="display:none;">
      <p class="is-size-5 has-text-weight-bold">計算結果:</p>
      <p>最大配置数: <span id="maxChairs"></span> 席</p>
      <p>列数: <span id="cols"></span> 列, 行数: <span id="rows"></span> 行</p>
      <p class="has-text-danger" id="warningMessage" style="display:none;">要求数に満たないため、最大配置数を示しています。</p>
    </div>

    <div class="dimensions-box" style="margin-top: 20px;">
        <p class="subtitle is-6">寸法線凡例</p>
        <div class="legend-item">
            <div class="color-box" style="background-color: #3273dc;"></div>
            <span>壁とイスの間隔</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background-color: #d33;"></div>
            <span>イスとイスの間隔</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background-color: #ff8c00;"></div>
            <span>通路の幅</span>
        </div>
        <div class="legend-item">
            <div class="color-box" style="background-color: #23d160;"></div>
            <span>障害物とイスの間隔</span>
        </div>
    </div>

    <footer class="footer" style="padding: 1rem 0; background-color: transparent;">
        <div class="content has-text-centered">
            <p>
                <strong>イス配置シミュレータ</strong> by @gemini-pro
            </p>
            <p>
                <a href="https://github.com/google-gemini-ai/gemma-architecture" target="_blank">GitHub</a>
            </p>
        </div>
    </footer>
  </div>

  <div class="column is-three-quarter canvas-container">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loader"></div>
      <p class="is-size-5 has-text-weight-bold">計算中...</p>
    </div>
    <canvas id="layoutCanvas"></canvas>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // 初期表示の切り替え
    const modeSelect = document.getElementById('calculationMode');
    const requiredField = document.getElementById('requiredChairsField');
    modeSelect.addEventListener('change', () => {
        requiredField.style.display = modeSelect.value === 'total' ? 'flex' : 'none';
    });
    modeSelect.dispatchEvent(new Event('change')); // 初期状態を反映

    // 最初に一度計算を実行
    calculateLayout();
});

// キャンバス要素とコンテキスト
const canvas = document.getElementById('layoutCanvas');
const ctx = canvas.getContext('2d');
const AISLE_WIDTH_CM = 100; // Python側の定数と同期

/**
 * 描画関数
 * @param {object} data - サーバーから受け取ったレイアウトデータ
 */
function drawLayout(data) {
    if (!data.found) {
        // キャンバスをクリア
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // エラーメッセージの描画
        ctx.fillStyle = '#333';
        ctx.font = '20px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('配置可能なイスが見つかりませんでした。', canvas.width / 2, canvas.height / 2);
        return;
    }

    // --- 1. スケールとキャンバスサイズの設定 ---
    // 会場の最大寸法を取得
    const hallWidth = data.hall_width;
    const hallDepth = data.hall_depth;
    
    // キャンバスの表示領域（ここではコンテナサイズ）
    const containerWidth = canvas.parentElement.clientWidth;
    const containerHeight = canvas.parentElement.clientHeight;
    
    // スケール計算（会場サイズがコンテナサイズに収まるように）
    const scaleFactorW = containerWidth / hallWidth;
    const scaleFactorH = containerHeight / hallDepth;
    const scale = Math.min(scaleFactorW, scaleFactorH) * 0.9; // 90%に縮小してマージンを取る

    // 描画サイズ（会場サイズをスケール適用したもの）
    const drawWidth = hallWidth * scale;
    const drawDepth = hallDepth * scale;

    // キャンバスの描画サイズを更新
    canvas.width = containerWidth;
    canvas.height = containerHeight;

    // オフセット計算（中央寄せ）
    const offsetX = (containerWidth - drawWidth) / 2;
    const offsetY = (containerHeight - drawDepth) / 2;

    // スケールとオフセットを適用する変換関数
    const toPx = (cm) => cm * scale;
    const toCanvasX = (cm) => offsetX + toPx(cm);
    const toCanvasY = (cm) => offsetY + toPx(cm);

    // --- 2. 会場の枠を描画 ---
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.fillRect(toCanvasX(0), toCanvasY(0), drawWidth, drawDepth);
    
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.strokeRect(toCanvasX(0), toCanvasY(0), drawWidth, drawDepth);

    // --- 3. イスを描画 ---
    const chairW_px = toPx(data.chair_width);
    const chairD_px = toPx(data.chair_depth);
    ctx.fillStyle = '#6ab8ff'; // イスの色（青）
    
    data.coords.forEach(coord => {
        const x = toCanvasX(coord[0]);
        const y = toCanvasY(coord[1]);
        ctx.fillRect(x, y, chairW_px, chairD_px);
        ctx.strokeStyle = '#3273dc';
        ctx.lineWidth = 1;
        ctx.strokeRect(x, y, chairW_px, chairD_px);
    });

    // --- 4. 寸法線と数値を描画 ---
    const fontSize = Math.max(12, toPx(25)); // 最小12px, 25cmを基準にスケーリング
    ctx.font = `${fontSize}px sans-serif`;

    // 4-1. イスとイスの間隔を描画 (赤色)
    ctx.fillStyle = '#d33';
    ctx.strokeStyle = '#d33';
    ctx.lineWidth = 2;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    // 横の間隔
    if (data.cols > 1 && data.coords.length >= 2) { 
        const chair1 = data.coords[0]; 
        const chair2 = data.coords[1];
        
        // イス同士の間隔（通常間隔）の描画判定
        const gapX = chair2[0] - (chair1[0] + data.chair_width);
        if (Math.abs(gapX - data.spacing_x) < 1) { // 誤差を考慮
            const startX = toCanvasX(chair1[0] + data.chair_width); 
            const endX = toCanvasX(chair2[0]);
            const midY = toCanvasY(chair1[1] + data.chair_depth / 2);
            
            ctx.beginPath();
            ctx.moveTo(startX, midY); ctx.lineTo(endX, midY); // 水平線
            ctx.moveTo(startX, midY - 10); ctx.lineTo(startX, midY + 10); // 左端のケバ
            ctx.moveTo(endX, midY - 10); ctx.lineTo(endX, midY + 10); // 右端のケバ
            ctx.stroke();
            // イスの間隔の数値（data.spacing_x）を描画
            ctx.fillText(`${data.spacing_x} cm`, (startX + endX) / 2, midY + fontSize);
        }
    }
    
    // 縦の間隔
    if (data.rows > 1 && data.coords.length > data.cols) { 
        const chair1 = data.coords[0]; 
        const chair2 = data.coords[data.cols];
        
        // イス同士の間隔（通常間隔）の描画判定
        const gapY = chair2[1] - (chair1[1] + data.chair_depth);
        if (Math.abs(gapY - data.spacing_y) < 1) { // 誤差を考慮
            const startY = toCanvasY(chair1[1] + data.chair_depth); 
            const endY = toCanvasY(chair2[1]);
            const midX = toCanvasX(chair1[0] + data.chair_width / 2);
            
            ctx.beginPath();
            ctx.moveTo(midX, startY); ctx.lineTo(midX, endY); // 垂直線
            ctx.moveTo(midX - 10, startY); ctx.lineTo(midX + 10, startY); // 上端のケバ
            ctx.moveTo(midX - 10, endY); ctx.lineTo(midX + 10, endY); // 下端のケバ
            ctx.stroke();
            // イスの間隔の数値（data.spacing_y）を描画
            ctx.fillText(`${data.spacing_y} cm`, midX + fontSize, (startY + endY) / 2);
        }
    }

    // 4-2. 壁とイスの間の距離を描画 (青色)
    ctx.fillStyle = '#3273dc';
    ctx.strokeStyle = '#3273dc';
    
    if (data.coords.length > 0) {
        const firstChair = data.coords[0];
        const lastChair = data.coords[data.coords.length - 1];
        
        // 左側の壁
        if (data.wall_space_l > 0) {
            const startX = toCanvasX(0); 
            const endX = toCanvasX(firstChair[0]);
            const midY = toCanvasY(firstChair[1] + data.chair_depth / 2 - data.chair_depth); // イスの上の位置
            
            ctx.beginPath();
            ctx.moveTo(startX, midY); ctx.lineTo(endX, midY);
            ctx.moveTo(startX, midY - 10); ctx.lineTo(startX, midY + 10);
            ctx.moveTo(endX, midY - 10); ctx.lineTo(endX, midY + 10);
            ctx.stroke();
            ctx.fillText(`${data.wall_space_l} cm`, (startX + endX) / 2, midY + fontSize);
        }
        
        // 上側の壁
        if (data.wall_space_u > 0) {
            const startY = toCanvasY(0);
            const endY = toCanvasY(firstChair[1]);
            const midX = toCanvasX(firstChair[0] + data.chair_width / 2 - data.chair_width); // イスの左の位置
            
            ctx.beginPath();
            ctx.moveTo(midX, startY); ctx.lineTo(midX, endY);
            ctx.moveTo(midX - 10, startY); ctx.lineTo(midX + 10, startY);
            ctx.moveTo(midX - 10, endY); ctx.lineTo(midX + 10, endY);
            ctx.stroke();
            // 90度回転して描画
            ctx.save();
            ctx.translate(midX - fontSize, (startY + endY) / 2);
            ctx.rotate(-Math.PI/2);
            ctx.textAlign = 'center';
            ctx.fillText(`${data.wall_space_u} cm`, 0, 0);
            ctx.restore();
        }

        // 右側の壁
        if (data.wall_space_r > 0) {
            const startX = toCanvasX(lastChair[0] + data.chair_width); 
            const endX = toCanvasX(hallWidth);
            const midY = toCanvasY(lastChair[1] + data.chair_depth / 2 - data.chair_depth);
            
            ctx.beginPath();
            ctx.moveTo(startX, midY); ctx.lineTo(endX, midY);
            ctx.moveTo(startX, midY - 10); ctx.lineTo(startX, midY + 10);
            ctx.moveTo(endX, midY - 10); ctx.lineTo(endX, midY + 10);
            ctx.stroke();
            ctx.fillText(`${data.wall_space_r} cm`, (startX + endX) / 2, midY + fontSize);
        }

        // 下側の壁
        if (data.wall_space_d > 0) {
            const startY = toCanvasY(lastChair[1] + data.chair_depth);
            const endY = toCanvasY(hallDepth);
            const midX = toCanvasX(lastChair[0] + data.chair_width / 2 - data.chair_width);
            
            ctx.beginPath();
            ctx.moveTo(midX, startY); ctx.lineTo(midX, endY);
            ctx.moveTo(midX - 10, startY); ctx.lineTo(midX + 10, startY);
            ctx.moveTo(midX - 10, endY); ctx.lineTo(midX + 10, endY);
            ctx.stroke();
            // 90度回転して描画
            ctx.save();
            ctx.translate(midX - fontSize, (startY + endY) / 2);
            ctx.rotate(-Math.PI/2);
            ctx.textAlign = 'center';
            ctx.fillText(`${data.wall_space_d} cm`, 0, 0);
            ctx.restore();
        }
    }
    
        // --- 4-3. 通路の幅を描画 (オレンジ色) ---
        // 通路の幅は Python 側の定数 AISLE_WIDTH_CM = 100cm を使用
        const AISLE_WIDTH_CM = 100; 
        const aisleSpacingX = data.spacing_x + AISLE_WIDTH_CM;
        const aisleSpacingY = data.spacing_y + AISLE_WIDTH_CM;
        ctx.fillStyle = '#ff8c00'; // オレンジ
        ctx.strokeStyle = '#ff8c00';
        ctx.lineWidth = 2;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        const numCoords = data.coords.length;
        const layoutCols = data.cols;
        
        // 4-3-1. 横通路（垂直線）の幅を描画
        // 最初の行 (0行目) のイスをチェックし、最初の通路を特定
        for (let i = 0; i < layoutCols - 1 && i < numCoords - 1; i++) {
            const chair1 = data.coords[i];
            const chair2 = data.coords[i + 1];
            
            // Chair 1 の終了位置と Chair 2 の開始位置の差分 = イス間の空間
            const gap = chair2[0] - (chair1[0] + data.chair_width);

            // 誤差を考慮して、間隔が (spacing_x + 100) に近いかチェック（通路の幅を含んだ間隔）
            if (Math.abs(gap - aisleSpacingX) < 1) { 
                // Aisle Gap を発見
                const startX = toCanvasX(chair1[0] + data.chair_width + data.spacing_x); // 通路の開始位置（イス間隔の終点）
                const endX = toCanvasX(chair2[0]);                                       // 通路の終了位置（次のイスの開始位置）
                const midY = toCanvasY(chair1[1] + data.chair_depth / 2 - data.chair_depth);           // 既存の赤線と重ならないように、青線と近い位置に描画
                
                // 横の寸法線
                ctx.beginPath();
                ctx.moveTo(startX, midY); ctx.lineTo(endX, midY); 
                ctx.moveTo(startX, midY - 10); ctx.lineTo(startX, midY + 10); 
                ctx.moveTo(endX, midY - 10); ctx.lineTo(endX, midY + 10); 
                ctx.stroke();
                
                // 通路の幅 (100cm) を描画
                ctx.fillText(`通路 ${AISLE_WIDTH_CM} cm`, (startX + endX) / 2, midY + fontSize);
                break; // 最初の通路だけ描画
            }
        }
        
        // 4-3-2. 縦通路（水平線）の幅を描画
        // 最初の列 (0列目) のイスをチェックし、最初の通路を特定
        for (let i = 0; i < numCoords - layoutCols; i += layoutCols) {
            const chair1 = data.coords[i];
            const chair2 = data.coords[i + layoutCols]; // 次の行の同じ列のイス
            
            // Chair 1 の終了位置と Chair 2 の開始位置の差分 = イス間の空間
            const gap = chair2[1] - (chair1[1] + data.chair_depth);

            // 誤差を考慮して、間隔が (spacing_y + 100) に近いかチェック（通路の幅を含んだ間隔）
            if (Math.abs(gap - aisleSpacingY) < 1) { 
                // Aisle Gap を発見
                const startY = toCanvasY(chair1[1] + data.chair_depth + data.spacing_y); // 通路の開始位置（イス間隔の終点）
                const endY = toCanvasY(chair2[1]);                                       // 通路の終了位置（次のイスの開始位置）
                const midX = toCanvasX(chair1[0] + data.chair_width / 2 - data.chair_width);           // 既存の赤線と重ならないように、青線と近い位置に描画

                // 縦の寸法線
                ctx.beginPath();
                ctx.moveTo(midX, startY); ctx.lineTo(midX, endY); 
                ctx.moveTo(midX - 10, startY); ctx.lineTo(midX + 10, startY); 
                ctx.moveTo(midX - 10, endY); ctx.lineTo(midX + 10, endY); 
                ctx.stroke();
                
                // 通路の幅 (100cm) を描画（90度回転して表示）
                ctx.save();
                ctx.translate(midX - fontSize, (startY + endY) / 2); 
                ctx.rotate(-Math.PI/2);
                ctx.textAlign = 'center';
                ctx.fillText(`通路 ${AISLE_WIDTH_CM} cm`, 0, 0); 
                ctx.restore();
                
                break; // 最初の通路だけ描画
            }
        }


    // 4-3. 障害物とイスの間の距離を描画 (緑色)
    // イス座標計算時に同時に返される、障害物との最小距離情報があれば描画
    ctx.fillStyle = '#23d160';
    ctx.strokeStyle = '#23d160';
    
    // この描画ロジックは、障害物データ(`data.obstacles`)と
    // イスと障害物との最小距離データ(`data.min_distance_to_obstacle`)
    // がサーバーから提供される場合に機能します。
    // 現状のPythonコード(`sf05_02.py`)では提供されていないため、ここではスキップされます。
    // (将来的に機能追加された場合のプレースホルダーとして残します)
    /*
    if (data.min_distance_to_obstacle && data.obstacles && data.coords.length > 0) {
        data.obstacles.forEach(obs => {
            const minDist = data.min_distance_to_obstacle.find(d => d.obs_id === obs.id);
            if (!minDist) return;

            // 左側の最小距離
            if (minDist.left < Infinity) {
                const xStart = toCanvasX((obs.type === 'circle') ? obs.x + obs.radius : obs.x + obs.width);
                const xEnd = toCanvasX(minDist.nearestChair.right.x);
                const y = toCanvasY((obs.type === 'circle') ? obs.y : obs.y + obs.depth / 2);
                
                ctx.beginPath(); ctx.moveTo(xStart, y); ctx.lineTo(xEnd, y); 
                ctx.moveTo(xStart, y - 10); ctx.lineTo(xStart, y + 10); 
                ctx.moveTo(xEnd, y - 10); ctx.lineTo(xEnd, y + 10); 
                ctx.stroke();
                ctx.fillText(`${Math.round(minDist.left)} cm`, (xStart + xEnd) / 2, y - fontSize);
            }
            // ... 他の方向の描画ロジックも同様に追加
        });
    }
    */
    
    // --- 5. 会場寸法線の描画 ---
    ctx.fillStyle = '#666';
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 1;
    ctx.textAlign = 'center';
    
    const margin = 30; // 描画領域の外側のマージン
    
    // 幅 (W)
    const lineY_W = toCanvasY(hallDepth) + margin;
    ctx.beginPath();
    ctx.moveTo(toCanvasX(0), lineY_W); ctx.lineTo(toCanvasX(hallWidth), lineY_W);
    ctx.moveTo(toCanvasX(0), lineY_W - 10); ctx.lineTo(toCanvasX(0), lineY_W + 10);
    ctx.moveTo(toCanvasX(hallWidth), lineY_W - 10); ctx.lineTo(toCanvasX(hallWidth), lineY_W + 10);
    ctx.stroke();
    ctx.fillText(`${hallWidth} cm (W)`, toCanvasX(hallWidth / 2), lineY_W + fontSize);

    // 奥行 (D)
    const lineX_D = toCanvasX(hallWidth) + margin;
    ctx.beginPath();
    ctx.moveTo(lineX_D, toCanvasY(0)); ctx.lineTo(lineX_D, toCanvasY(hallDepth));
    ctx.moveTo(lineX_D - 10, toCanvasY(0)); ctx.lineTo(lineX_D + 10, toCanvasY(0));
    ctx.moveTo(lineX_D - 10, toCanvasY(hallDepth)); ctx.lineTo(lineX_D + 10, toCanvasY(hallDepth));
    ctx.stroke();
    // 90度回転して描画
    ctx.save();
    ctx.translate(lineX_D + fontSize, toCanvasY(hallDepth / 2));
    ctx.rotate(Math.PI/2);
    ctx.textAlign = 'center';
    ctx.fillText(`${hallDepth} cm (D)`, 0, 0);
    ctx.restore();
}

/**
 * サーバーに計算リクエストを送信する関数
 */
async function calculateLayout() {
    document.getElementById('loadingOverlay').style.display = 'flex';
    document.getElementById('result').style.display = 'none';

    const calculationMode = document.getElementById('calculationMode').value;
    const requiredChairs = calculationMode === 'total' ? parseInt(document.getElementById('requiredChairs').value) : null;
    
    // データ収集
    const data = {
        hall_width: parseInt(document.getElementById('hallWidth').value),
        hall_depth: parseInt(document.getElementById('hallDepth').value),
        chair_width: parseInt(document.getElementById('chairWidth').value),
        chair_depth: parseInt(document.getElementById('chairDepth').value),
        spacing_x: parseInt(document.getElementById('spacingX').value),
        spacing_y: parseInt(document.getElementById('spacingY').value),
        wall_space_l: parseInt(document.getElementById('wallSpaceL').value),
        wall_space_r: parseInt(document.getElementById('wallSpaceR').value),
        wall_space_u: parseInt(document.getElementById('wallSpaceU').value),
        wall_space_d: parseInt(document.getElementById('wallSpaceD').value),
        aisle_type: document.getElementById('aisleType').value,
        aisle_v_interval: parseInt(document.getElementById('aisleVInterval').value),
        aisle_h_interval: parseInt(document.getElementById('aisleHInterval').value),
        calculation_mode: calculationMode,
        required_chairs: requiredChairs
    };

    // クライアント側での入力バリデーション
    const inputs = Object.values(data);
    if (inputs.some(val => isNaN(val) && typeof val === 'number')) {
        alert("全ての数値フィールドに有効な値を入力してください。");
        document.getElementById('loadingOverlay').style.display = 'none';
        return;
    }
    
    try {
        const response = await fetch('/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const result = await response.json();
        
        // エラー処理
        if (!response.ok || result.error) {
            alert(`計算エラー: ${result.error || response.statusText}`);
            drawLayout({ found: false }); // キャンバスをクリア
            return;
        }

        // 結果の表示を更新
        document.getElementById('maxChairs').textContent = result.max;
        document.getElementById('cols').textContent = result.cols;
        document.getElementById('rows').textContent = result.rows;
        
        const warning = document.getElementById('warningMessage');
        if (result.calculation_mode === 'total' && result.max < result.required_chairs) {
            warning.style.display = 'block';
        } else {
            warning.style.display = 'none';
        }

        // キャンバスに描画
        drawLayout(result);
        
        // 結果ボックスを表示
        document.getElementById('result').style.display = 'block';

    } catch (error) {
        console.error('Fetch error:', error);
        alert('サーバーとの通信中にエラーが発生しました。');
        drawLayout({ found: false }); // キャンバスをクリア
    } finally {
        document.getElementById('loadingOverlay').style.display = 'none';
    }
}
</script>
